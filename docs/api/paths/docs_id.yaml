get:
  tags: [docs]
  summary: ドキュメントのダウンロード
  description: |
    指定したUUIDのドキュメントを構成する全ファイルをzipでまとめて返す

    `Content-Disposition`にzipのファイル名を付与する
  parameters:
    - name: id
      in: path
      required: true
      description: ドキュメントのUUID
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: ドキュメントの全ファイルを含むzip
      headers:
        Content-Disposition:
          description: ダウンロード時のファイル名
          schema:
            type: string
            examples: ["attachment; filename*=UTF-8''%E7%B7%9A%E5%BD%A2%E4%BB%A3%E6%95%B0_2025_final.zip"]
      content:
        application/zip:
          schema:
            type: string
            format: binary
    "401":
      $ref: "../openapi.yaml#/components/responses/Unauthorized"
    "404":
      $ref: "../openapi.yaml#/components/responses/NotFound"
