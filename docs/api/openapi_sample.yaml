openapi: 3.1.0
info:
  title: 過去問アップローダー API
  version: 0.1.0
  description: |
    部内の過去問を管理するためのAPI．
    科目・年度・試験種別を指定してファイルをアップロード，一覧，絞り込み，ダウンロードする．
    認証はCloudflare Accessが前段で行い，アップロード者はその認証情報から記録するため，
    リクエストボディには含めない．

servers:
  - url: localhost/api
    description: 開発用

tags:
  - name: subjects
    description: 教科情報
  - name: files
    description: ファイルの操作

paths:
  /subjects:
    get:
      tags: [subjects]
      summary: 教科一覧の取得
      description: フォームの科目選択肢，および絞り込みに使う教科の一覧を返す．
      operationId: listSubjects
      responses:
        "200":
          description: 教科一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"

  /files:
    get:
      tags: [files]
      summary: ファイル一覧の取得（絞り込み対応）
      description: 科目・年度・試験種別で絞り込んだファイルのメタデータ一覧を返す．
      operationId: listFiles
      parameters:
        - $ref: "#/components/parameters/SubjectIdQuery"
        - $ref: "#/components/parameters/YearQuery"
        - $ref: "#/components/parameters/ExamTypeQuery"
      responses:
        "200":
          description: ファイル一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
    post:
      tags: [files]
      summary: ファイルのアップロード
      description: |
        科目・年度・試験種別を必須として，ファイルをアップロードする．
        サーバ側でファイルの検証（種別・サイズ等）を行う．
        アップロード者はCloudflare Accessの認証情報から記録する．
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [subject_id, year, exam_type, file]
              properties:
                subject_id:
                  type: integer
                  format: int64
                  description: 既存の教科ID
                year:
                  $ref: "#/components/schemas/Year"
                exam_type:
                  $ref: "#/components/schemas/ExamType"
                file:
                  type: string
                  format: binary
                  description: アップロードするファイル本体
      responses:
        "201":
          description: 作成されたファイルのメタデータ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: ファイルサイズが上限を超過
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: 許可されていないファイル種別
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /files/download:
    get:
      tags: [files]
      summary: 絞り込み結果の一括ダウンロード
      description: |
        科目等で絞り込んだファイル群をまとめてZIPでダウンロードする．
        教科を指定してその部分を一括ダウンロードする用途を想定．
      operationId: downloadFilesArchive
      parameters:
        - $ref: "#/components/parameters/SubjectIdQuery"
        - $ref: "#/components/parameters/YearQuery"
        - $ref: "#/components/parameters/ExamTypeQuery"
      responses:
        "200":
          description: ZIPアーカイブ
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /files/{id}:
    parameters:
      - $ref: "#/components/parameters/FileIdPath"
    delete:
      tags: [files]
      summary: ファイルの削除
      description: 削除専用画面から呼び出す，単一ファイルの削除．
      operationId: deleteFile
      responses:
        "204":
          description: 削除に成功
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/download:
    parameters:
      - $ref: "#/components/parameters/FileIdPath"
    get:
      tags: [files]
      summary: 単一ファイルのダウンロード
      operationId: downloadFile
      responses:
        "200":
          description: ファイル本体
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    FileIdPath:
      name: id
      in: path
      required: true
      description: ファイルID
      schema:
        type: integer
        format: int64
    SubjectIdQuery:
      name: subject_id
      in: query
      required: false
      description: 教科IDで絞り込む
      schema:
        type: integer
        format: int64
    YearQuery:
      name: year
      in: query
      required: false
      description: 年度で絞り込む
      schema:
        $ref: "#/components/schemas/Year"
    ExamTypeQuery:
      name: exam_type
      in: query
      required: false
      description: 試験種別で絞り込む
      schema:
        $ref: "#/components/schemas/ExamType"

  responses:
    BadRequest:
      description: リクエストが不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 対象が存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Year:
      type: integer
      description: 年度（西暦）
      minimum: 1990
      maximum: 2100
      examples: [2025]

    ExamType:
      type: string
      description: 試験種別
      enum:
        - midterm
        - final
        - quiz
        - makeup
        - other
      x-enum-descriptions:
        midterm: 中間試験
        final: 期末試験
        quiz: 小テスト
        makeup: 再試験
        other: その他

    Subject:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 教科名
          examples: ["線形代数"]

    File:
      type: object
      description: 保存済みファイルのメタデータ
      required:
        - id
        - subject_id
        - subject_name
        - year
        - exam_type
        - original_filename
        - content_type
        - size_bytes
        - uploaded_by
        - uploaded_at
      properties:
        id:
          type: integer
          format: int64
        subject_id:
          type: integer
          format: int64
        subject_name:
          type: string
          description: 表示用の教科名
        year:
          $ref: "#/components/schemas/Year"
        exam_type:
          $ref: "#/components/schemas/ExamType"
        original_filename:
          type: string
          description: アップロード時の元ファイル名
        content_type:
          type: string
          description: MIMEタイプ
          examples: ["application/pdf"]
        size_bytes:
          type: integer
          format: int64
          minimum: 0
          description: ファイルサイズ（バイト）
        uploaded_by:
          type: string
          description: アップロード者（Cloudflare Accessの認証メールアドレス）
          format: email
        uploaded_at:
          type: string
          format: date-time
          description: アップロード日時

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: エラーの概要
        details:
          type: string
          description: 追加情報
