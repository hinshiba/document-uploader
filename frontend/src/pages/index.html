<!DOCTYPE html>
<html lang="ja">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document Uploader</title>
		<link rel="stylesheet" href="../styles/main.css">
	</head>

	<body>
		<header>

			過去問アップローダー!!
		</header>
		<main id="main">
			<form>
				ここのBoxからアップロードしたい教科を選んでください．
				<label for="faculty">学部を選択してください</label>
				<select id="faculty" name="faculty"></select>
				<input type="file" id="file" multiple>
				<label for="file">ファイルを選択してください</label>

				<div id="drop-area">

					<p id="message">ここにファイルをドラッグしてください</p>
					<ul id="makelist"></ul>
				</div>
				<button id="uploadbtn">送信</button>
				<p id="thank"></p>
				<input type="submit" value="送信">
			</form>
		</main>
		<footer>
		</footer>
		<script type="module" src=../scripts/form.ts></script>
		<script src=../scripts/upload.ts></script>
	</body>
</html>
