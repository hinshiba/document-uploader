{% extends "base.html" %} {% block styles %}<link
    rel="stylesheet"
    href="upload.css"
>{% endblock %} {% block content %}

<main>
    <h2>アップロード</h2>
    <p>貢献に感謝します</p>

    <form>
        <p>アップロードしたい教科を選んでください．</p>

        <major-select></major-select>

        <div class="form-group">
            <label for="year">年度(西暦)</label>
            <input type="number" id="year" name="year" required>
        </div>

        <div class="form-group">
            <label for="term">学期</label>
            <select id="term" name="term" required>
                <option value="">選択してください</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </div>

        <div class="form-group">
            <label for="teacher">教員名</label>
            <input type="text" id="teacher" name="teacher" required>
        </div>

        <div class="form-group">
            <label for="examtype">試験種別</label>
            <select id="examtype" name="examtype" required>
                <option value="">選択してください</option>
                <option value="quiz">小テスト</option>
                <option value="midterm">中間</option>
                <option value="final">期末</option>
                <option value="other">その他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="grade">学年</label>
            <select id="grade" name="grade" required>
                <option value="">選択してください</option>
                <option value="1">B1</option>
                <option value="2">B2</option>
                <option value="3">B3</option>
                <option value="4">B4</option>
                <option value="4">M1</option>
                <option value="4">M2</option>
                <option value="4">D1</option>
                <option value="4">D2</option>
                <option value="4">D3</option>
            </select>
        </div>

        <div class="form-group">
            <label for="subject">科目名</label>
            <input type="text" id="subject" name="subject" required>
        </div>

        <div class="form-group">
            <label for="num">謎</label>
            <input type="number" id="num" name="num" required>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="isanswer" name="isanswer">
            <label for="isanswer">これは解答ですか？</label>
        </div>

        <label for="file">ファイルを選択してください</label>
        <input type="file" id="file" multiple>

        <div class="drop-area" id="drop-area">
            <p id="message">ここにファイルをドラッグしてください</p>
            <ul id="makelist"></ul>
        </div>

        <button id="uploadbtn" type="submit">送信</button>
        <p id="thank"></p>
    </form>
</main>

{% endblock content %} {% block scripts %}
<script type="module" src="../scripts/upload.ts"></script>
{% endblock %}
